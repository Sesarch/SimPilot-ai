# ============================================================================
#  SimPilot Bridge — Windows Installer CI
# ----------------------------------------------------------------------------
#  Triggered on every tag matching v*.*.* (e.g. v1.0.0).
#  1. Builds the Electron tray app for Windows x64 with @electron/packager
#  2. Compiles the Inno Setup wizard into SimPilotBridge-Setup-X.Y.Z.exe
#  3. Generates latest.yml (sha512 + size) for the in-app auto-updater
#  4. (Optional) Code-signs the installer if SIGN_CERT_PFX_BASE64 is provided
#  5. Publishes everything as a GitHub Release asset
# ============================================================================

name: Build SimPilot Bridge Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0). Leave blank to use package.json."
        required: false

permissions:
  contents: write   # needed to upload release assets

jobs:
  build:
    name: Build & package (windows-latest)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridge-desktop

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout + tooling
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      # ------------------------------------------------------------------
      # 2. Resolve version (tag → strip leading "v"; manual → input; else package.json)
      # ------------------------------------------------------------------
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $manual = "${{ github.event.inputs.version }}"
          if ($manual) {
            $v = $manual
          } elseif ($tag -match "^v(.+)$") {
            $v = $Matches[1]
          } else {
            $v = (Get-Content package.json | ConvertFrom-Json).version
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $v"

      # ------------------------------------------------------------------
      # 3. Package the Electron tray app for Windows x64
      # ------------------------------------------------------------------
      - name: Package Electron app (win32 x64)
        run: npx @electron/packager . SimPilotBridge --platform=win32 --arch=x64 --out=release --overwrite --prune=true --ignore="^/release"

      # ------------------------------------------------------------------
      # 4. Stage the .exe + bridge-core into installer/payload/
      # ------------------------------------------------------------------
      - name: Stage payload for Inno Setup
        shell: pwsh
        run: |
          $payload = "installer/payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          Copy-Item -Recurse -Force "release/SimPilotBridge-win32-x64/*" $payload
          # Ship the bridge-core sidecar alongside so main.cjs's bridgeEntryPath() resolves.
          if (Test-Path "../bridge") {
            New-Item -ItemType Directory -Force -Path "$payload/bridge-core" | Out-Null
            Copy-Item -Recurse -Force "../bridge/*" "$payload/bridge-core"
          }
          Get-ChildItem $payload | Select-Object Name, Length

      # ------------------------------------------------------------------
      # 5. Convert PNG wizard art to BMP / ICO that Inno Setup requires
      # ------------------------------------------------------------------
      - name: Convert wizard assets (PNG → BMP / ICO)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          function Convert-ToBmp($src, $dst) {
            if (Test-Path $src) {
              $img = [System.Drawing.Image]::FromFile((Resolve-Path $src))
              $img.Save((Join-Path (Get-Location) $dst), [System.Drawing.Imaging.ImageFormat]::Bmp)
              $img.Dispose()
              Write-Host "✓ $src → $dst"
            }
          }
          Convert-ToBmp "installer/assets/wizard-sidebar.png" "installer/assets/wizard-sidebar.bmp"
          Convert-ToBmp "installer/assets/wizard-header.png"  "installer/assets/wizard-header.bmp"

          # Build .ico from the app-icon.png (Inno wants multi-size ICO ideally, but a single 256 works fine).
          if (Test-Path "installer/assets/app-icon.png") {
            $png = [System.Drawing.Image]::FromFile((Resolve-Path "installer/assets/app-icon.png"))
            $bmp = New-Object System.Drawing.Bitmap $png, 256, 256
            $icoPath = Join-Path (Get-Location) "installer/assets/app-icon.ico"
            $fs = [System.IO.File]::Create($icoPath)
            $icon = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
            $icon.Save($fs)
            $fs.Close(); $bmp.Dispose(); $png.Dispose()
            Write-Host "✓ app-icon.ico generated"
          }

      # ------------------------------------------------------------------
      # 6. Compile the Inno Setup script
      # ------------------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" "installer/SimPilotBridge.iss"
          Get-ChildItem installer/output

      # ------------------------------------------------------------------
      # 7. (Optional) Code-sign the installer if a PFX is provided
      # ------------------------------------------------------------------
      - name: Code-sign installer
        if: env.SIGN_CERT_PFX_BASE64 != ''
        env:
          SIGN_CERT_PFX_BASE64: ${{ secrets.SIGN_CERT_PFX_BASE64 }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_CERT_PFX_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Desc | Select-Object -First 1).FullName
          $exe = "installer/output/SimPilotBridge-Setup-${{ steps.version.outputs.version }}.exe"
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfx /p $env:SIGN_CERT_PASSWORD $exe
          & $signtool verify /pa /v $exe
          Remove-Item $pfx -Force

      # ------------------------------------------------------------------
      # 8. Generate latest.yml for the auto-updater
      # ------------------------------------------------------------------
      - name: Generate latest.yml
        shell: pwsh
        run: |
          $exe = "installer/output/SimPilotBridge-Setup-${{ steps.version.outputs.version }}.exe"
          $bytes = [IO.File]::ReadAllBytes($exe)
          $sha = [Convert]::ToBase64String([System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes))
          $size = (Get-Item $exe).Length
          $name = Split-Path $exe -Leaf
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          $yml = @"
version: ${{ steps.version.outputs.version }}
files:
  - url: $name
    sha512: $sha
    size: $size
path: $name
sha512: $sha
releaseDate: '$date'
"@
          $ymlPath = "installer/output/latest.yml"
          [IO.File]::WriteAllText($ymlPath, $yml)
          Write-Host $yml

      # ------------------------------------------------------------------
      # 9. Upload artifacts (always) + attach to Release (only on tag push)
      # ------------------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimPilotBridge-Setup-${{ steps.version.outputs.version }}
          path: |
            bridge-desktop/installer/output/*.exe
            bridge-desktop/installer/output/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SimPilot Bridge ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bridge-desktop/installer/output/SimPilotBridge-Setup-${{ steps.version.outputs.version }}.exe
            bridge-desktop/installer/output/latest.yml

  # ============================================================================
  #  macOS build — packages the Electron tray app as a .zip for both Intel and
  #  Apple Silicon, then attaches them to the same GitHub release.
  #  No code-signing / notarization yet — users will need to right-click → Open
  #  the first time (we surface this in the Bridge Setup page instructions).
  # ============================================================================
  build-macos:
    name: Build & package (macos-latest)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: bridge-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          MANUAL="${{ github.event.inputs.version }}"
          if [ -n "$MANUAL" ]; then
            V="$MANUAL"
          elif [[ "$TAG" =~ ^v(.+)$ ]]; then
            V="${BASH_REMATCH[1]}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      # Stage the bridge-core sidecar inside the app dir so @electron/packager
      # bundles it (matches how main.cjs's bridgeEntryPath() resolves it).
      - name: Stage bridge-core sidecar
        shell: bash
        run: |
          if [ -d "../bridge" ]; then
            mkdir -p bridge-core
            cp -R ../bridge/. bridge-core/
            ls bridge-core
          fi

      - name: Package Electron app (darwin x64 + arm64)
        run: |
          npx @electron/packager . SimPilotBridge \
            --platform=darwin --arch=x64 \
            --out=release --overwrite --prune=true \
            --ignore="^/release"
          npx @electron/packager . SimPilotBridge \
            --platform=darwin --arch=arm64 \
            --out=release --overwrite --prune=true \
            --ignore="^/release"

      - name: Create .zip archives
        id: zip
        shell: bash
        run: |
          V="${{ steps.version.outputs.version }}"
          mkdir -p installer/output
          # ditto preserves macOS metadata (resource forks, symlinks, exec bits)
          # which is required for the .app bundle to launch after extraction.
          ditto -c -k --sequesterRsrc --keepParent \
            "release/SimPilotBridge-darwin-x64/SimPilotBridge.app" \
            "installer/output/SimPilotBridge-${V}-mac-x64.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "release/SimPilotBridge-darwin-arm64/SimPilotBridge.app" \
            "installer/output/SimPilotBridge-${V}-mac-arm64.zip"
          ls -lh installer/output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimPilotBridge-macOS-${{ steps.version.outputs.version }}
          path: bridge-desktop/installer/output/*.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SimPilot Bridge ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bridge-desktop/installer/output/SimPilotBridge-${{ steps.version.outputs.version }}-mac-x64.zip
            bridge-desktop/installer/output/SimPilotBridge-${{ steps.version.outputs.version }}-mac-arm64.zip
