# ============================================================================
#  SEO Live Check — fetches robots.txt and sitemap.xml from a freshly built
#  preview server and verifies all rules match the route list and resolve
#  with the expected HTTP status codes.
#
#  Runs on:
#   • Every push to main / develop
#   • Every pull request that touches routing, robots, sitemap, or SEO code
# ============================================================================

name: SEO Live Check

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - "src/App.tsx"
      - "src/components/SEOHead.tsx"
      - "src/lib/ogImages.ts"
      - "scripts/sitemap-routes.ts"
      - "scripts/generate-sitemap.ts"
      - "public/robots.txt"
      - "public/sitemap.xml"
      - "src/test/seo-live-check.test.ts"
      - "src/test/sitemap-coverage.test.ts"
      - "src/test/og-images.test.ts"
      - "src/test/seo-tags.test.ts"
      - "public/og-*.jpg"
      - "public/og-*.png"
      - ".github/workflows/seo-live-check.yml"

jobs:
  seo-live-check:
    name: Validate robots.txt + sitemap.xml against live preview
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 1. Hermetic drift-guard: routes ↔ sitemap ↔ robots cross-reference.
      - name: Run sitemap drift-guard tests
        run: bunx vitest run src/test/sitemap-coverage.test.ts

      # 2. Build the production bundle so sitemap.xml is regenerated by the
      #    Vite plugin and the SPA index.html is served exactly as in prod.
      - name: Build production bundle
        run: bun run build

      # 3. Boot `vite preview` in the background and wait for it to be ready.
      - name: Start preview server
        run: |
          bunx vite preview --port 4173 --host 127.0.0.1 &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/robots.txt > /dev/null; then
              echo "✓ preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "✗ preview server failed to start"
          exit 1

      # 4. Run the live SEO check against the preview server. The test files
      #    are auto-skipped unless RUN_LIVE_SEO_CHECK=1 is set.
      - name: Run live SEO check
        env:
          RUN_LIVE_SEO_CHECK: "1"
          SEO_CHECK_BASE_URL: "http://127.0.0.1:4173"
        run: bunx vitest run src/test/seo-live-check.test.ts src/test/og-images.test.ts src/test/seo-tags.test.ts

      - name: Stop preview server
        if: always()
        run: kill ${PREVIEW_PID} 2>/dev/null || true
