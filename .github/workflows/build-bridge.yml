name: Build SimPilot Bridge Installer (Windows)

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: bridge-desktop
        run: npm install

      - name: Build Windows installer
        working-directory: bridge-desktop
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimPilotBridge-Setup
          path: bridge-desktop/dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          name: SimPilot Bridge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: bridge-desktop/dist/*.exe
