name: Build SimPilot Bridge Installer (Windows)

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ignore missing package-lock.json
        shell: pwsh
        run: |
          if (Test-Path "bridge-desktop/package-lock.json") {
            Write-Host "package-lock.json found in bridge-desktop"
          } else {
            Write-Host "package-lock.json not found in bridge-desktop, continuing with npm install"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location bridge-desktop
          npm install

      - name: Build NSIS installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-Location bridge-desktop
          npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimPilotBridge-Setup
          path: bridge-desktop/dist/*.exe
          if-no-files-found: error
