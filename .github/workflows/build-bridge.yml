name: Build SimPilot Bridge (Windows)

# Builds SimPilotBridge.exe on a Windows runner and attaches it to a GitHub
# Release. Trigger by pushing a tag like `bridge-v0.2.0`, or manually from the
# Actions tab via "Run workflow".
on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the release

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build SimPilotBridge.exe
        run: npm run build:win

      - name: Verify build output and compute SHA-256
        id: hash
        shell: pwsh
        run: |
          if (!(Test-Path "dist/SimPilotBridge.exe")) {
            Write-Error "Build failed — dist/SimPilotBridge.exe not found"
            exit 1
          }
          $info = Get-Item dist/SimPilotBridge.exe
          $info | Format-List Name, Length, LastWriteTime
          $hash = (Get-FileHash dist/SimPilotBridge.exe -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA-256: $hash"
          # Write the hash to a sidecar file uploaded with the binary
          "$hash  SimPilotBridge.exe" | Out-File -Encoding ascii dist/SimPilotBridge.exe.sha256
          # Expose for later steps
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$($info.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: SimPilotBridge-windows
          path: |
            bridge/dist/SimPilotBridge.exe
            bridge/dist/SimPilotBridge.exe.sha256
          if-no-files-found: error

      - name: Build release notes with checksum
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        shell: pwsh
        run: |
          $notes = @"
          ## SimPilot Bridge ${{ github.ref_name }}

          Local sidecar that streams MSFS 2024 (SimConnect) and X-Plane 12 (UDP) telemetry to the SimPilot.AI Flight Deck.

          ### Download
          - **SimPilotBridge.exe** — Windows x64 (${{ steps.hash.outputs.size }} bytes)

          ### Verify integrity (SHA-256)
          ``${{ steps.hash.outputs.sha256 }}``

          PowerShell:
          ``````powershell
          Get-FileHash SimPilotBridge.exe -Algorithm SHA256
          ``````

          macOS / Linux:
          ``````bash
          shasum -a 256 SimPilotBridge.exe
          ``````
          "@
          $notes | Out-File -Encoding utf8 release-notes.md

      - name: Create / update GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          name: SimPilot Bridge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: bridge/release-notes.md
          append_body: true
          generate_release_notes: true
          files: |
            bridge/dist/SimPilotBridge.exe
            bridge/dist/SimPilotBridge.exe.sha256
